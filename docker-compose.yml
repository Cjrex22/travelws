version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wandrr-postgres
    environment:
      POSTGRES_DB: wandrr_db
      POSTGRES_USER: wandrr_user
      POSTGRES_PASSWORD: wandrr_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wandrr-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
